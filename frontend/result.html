<div class="modal-overlay" id="accountModal">
    <div class="modal">
        <h2>Konto erstellen</h2>
        <p class="modal-sub">Erstellen Sie ein kostenloses Konto um Ihren Bericht zu erhalten und bei zukünftigen Schreiben Ihres Vermieters auf Ihre Analyse zugreifen zu können. Sie erhalten außerdem 2 weitere Analysen.</p>

        <p style="font-family:Arial,sans-serif; color:#999; font-size:12px">Wird geladen...</p>

<script>
const rawData = localStorage.getItem('analyseErgebnis');
const rawNutzer = localStorage.getItem('nutzerdaten');
if (!rawData) { window.location.href = '/'; }

const data = JSON.parse(rawData);
const nutzerdaten = JSON.parse(rawNutzer) || {};
const analyse = data.ergebnis?.analyse;
const dokumentTyp = data.ergebnis?.dokumentTyp || nutzerdaten.vorgewaehlterTyp || 'MIETERHÖHUNG';
const nkFall = data.ergebnis?.nkFall || nutzerdaten.nkFall || 'NEBENKOSTENABRECHNUNG';
const fehler = analyse?.fehler || [];
const maengel = analyse?.maengelArgumente || [];
const urteil = analyse?.gesamturteil || '';

function track(eventName, params) {
    window.dataLayer = window.dataLayer || [];
    window.dataLayer.push({ event: eventName, ...params });
    if (typeof gtag !== 'undefined') gtag('event', eventName, params || {});
}
track('ergebnis_gesehen', { fall_typ: dokumentTyp });

// Timer bis Mitternacht
function getTimerString() {
    const now = new Date();
    const midnight = new Date();
    midnight.setHours(24, 0, 0, 0);
    let diff = Math.floor((midnight - now) / 1000);
    const h = Math.floor(diff / 3600);
    diff -= h * 3600;
    const m = Math.floor(diff / 60);
    const s = diff - m * 60;
    return `${h}h ${m}m ${s}s`;
}
function updateTimer() {
    const el = document.getElementById('timer');
    if (el) el.textContent = getTimerString();
}
setInterval(updateTimer, 1000);

// Urteil
let urteilKlasse = 'gelb', urteilTitel = '', urteilText = '';
if (dokumentTyp === 'MIETERHÖHUNG') {
    if (urteil.includes('NICHT') || urteil.includes('ANFECHTBAR')) {
        urteilKlasse = 'rot';
        urteilTitel = 'Die Mieterhöhung Ihres Vermieters ist unzulässig.';
        urteilText = 'Wir haben Fehler gefunden. Sie müssen dieser Erhöhung nicht zustimmen.';
    } else {
        urteilKlasse = 'gelb';
        urteilTitel = 'Die Mieterhöhung ist prüfenswert.';
        urteilText = 'Wir haben Gegenargumente gefunden die Ihre Position stärken.';
    }
} else if (dokumentTyp === 'KÜNDIGUNG') {
    if (urteil === 'UNWIRKSAM' || urteil.includes('ANFECHTBAR')) {
        urteilKlasse = 'rot';
        urteilTitel = 'Die Kündigung Ihres Vermieters ist anfechtbar.';
        urteilText = 'Wir haben formelle Fehler gefunden. Sie müssen nicht sofort ausziehen.';
    } else {
        urteilKlasse = 'gelb';
        urteilTitel = 'Die Kündigung ist prüfenswert.';
        urteilText = 'Wir haben Gegenargumente gefunden.';
    }
} else {
    urteilKlasse = 'rot';
    urteilTitel = urteil.includes('ANFECHTBAR') ? 'Ihre Nebenkostenabrechnung enthält Fehler.' : 'Die Nebenkostenabrechnung ist prüfenswert.';
    urteilText = 'Wir haben mögliche Fehler gefunden.';
}

// Kosten
const erhoehungEuro = parseFloat(analyse?.erhoehung_euro) || 0;
const nachzahlungBetrag = parseFloat(nutzerdaten.nachzahlung) || parseFloat(analyse?.nachzahlung_betrag) || 0;
let kostenHTML = '';
if (dokumentTyp === 'MIETERHÖHUNG' && erhoehungEuro > 0) {
    kostenHTML = `<div class="box">
        <div class="box-label">Was passiert wenn Sie jetzt nicht handeln?</div>
        <div class="kosten-zeile"><span class="kosten-label">Mehrkosten pro Monat</span><span class="kosten-betrag">+ ${erhoehungEuro.toFixed(0)} €</span></div>
        <div class="kosten-zeile"><span class="kosten-label">Mehrkosten pro Jahr</span><span class="kosten-betrag">+ ${(erhoehungEuro*12).toFixed(0)} €</span></div>
        <div class="kosten-zeile"><span class="kosten-label">Mehrkosten in 3 Jahren</span><span class="kosten-betrag">+ ${(erhoehungEuro*36).toFixed(0)} €</span></div>
        <div class="kosten-hinweis">Sie können das vermeiden — indem Sie fristgerecht <strong>Einspruch</strong> einlegen.</div>
    </div>`;
} else if (dokumentTyp === 'KÜNDIGUNG') {
    kostenHTML = `<div class="box">
        <div class="box-label">Was passiert wenn Sie jetzt nicht handeln?</div>
        <div class="kosten-zeile"><span class="kosten-label">Verlust Ihrer Wohnung</span><span class="kosten-betrag" style="color:#c0392b;">droht</span></div>
        <div class="kosten-zeile"><span class="kosten-label">Umzugskosten</span><span class="kosten-betrag">2.000 – 8.000 €</span></div>
        <div class="kosten-zeile"><span class="kosten-label">Höhere Miete neue Wohnung</span><span class="kosten-betrag">oft +200–600 €/Monat</span></div>
        <div class="kosten-hinweis">Sie können das abwenden — indem Sie fristgerecht <strong>Widerspruch</strong> einlegen.</div>
    </div>`;
} else if (nachzahlungBetrag > 0) {
    const besparnis = parseFloat(analyse?.gesamtePotenzielleBesparnis) || 0;
    kostenHTML = `<div class="box">
        <div class="box-label">Was steht auf dem Spiel?</div>
        <div class="kosten-zeile"><span class="kosten-label">Geforderte Nachzahlung</span><span class="kosten-betrag">${nachzahlungBetrag.toFixed(0)} €</span></div>
        ${besparnis > 0 ? `<div class="kosten-zeile"><span class="kosten-label">Davon potenziell nicht rechtmäßig</span><span class="kosten-betrag" style="color:#27ae60;">bis zu ${besparnis.toFixed(0)} €</span></div>` : ''}
        <div class="kosten-hinweis">Sie können das vermeiden — indem Sie fristgerecht <strong>Widerspruch</strong> einlegen.</div>
    </div>`;
}

// Wichtig Punkte
let wichtigPunkte = [];

function toggleFaq(i) {
    const item = document.getElementById('faq' + i);
    const wasOffen = item.classList.contains('offen');
    document.querySelectorAll('.faq-item').forEach(el => el.classList.remove('offen'));
    if (!wasOffen) item.classList.add('offen');
}

function kaufKlick() {

    document.getElementById('accountModal').classList.add('aktiv');
}

async function accountErstellen() {
    const email = document.getElementById('accountEmail').value;
    const passwort = document.getElementById('accountPasswort').value;
    const errorEl = document.getElementById('accountError');
    errorEl.style.display = 'none';
    if (!email || !passwort) { errorEl.textContent = 'Bitte Email und Passwort eingeben.'; errorEl.style.display = 'block'; return; }
    if (passwort.length < 6) { errorEl.textContent = 'Passwort muss mindestens 6 Zeichen haben.'; errorEl.style.display = 'block'; return; }
    try {
        const res = await fetch('/register', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ email, passwort }) });
        const d = await res.json();
        if (d.success || d.fehler === 'Email bereits registriert') {
            localStorage.setItem('mietcheck_account', JSON.stringify({ email }));
            document.getElementById('accountModal').classList.remove('aktiv');
            briefAnfordern();
        } else {
            errorEl.textContent = d.error || d.fehler || 'Fehler beim Erstellen.';
            errorEl.style.display = 'block';
        }
    } catch(e) { ohneKonto(); }
}

function ohneKonto() {
    document.getElementById('accountModal').classList.remove('aktiv');
    briefAnfordern();
}

async function briefAnfordern() {
    document.getElementById('preiseBox').style.display = 'none';
    document.getElementById('briefLoading').style.display = 'block';
    try {
        const res = await fetch('/generate-brief', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ analyseErgebnis: data.ergebnis, nutzerdaten })
        });
        const briefData = await res.json();
        document.getElementById('briefLoading').style.display = 'none';
        document.getElementById('briefText').textContent = briefData.brief;
        document.getElementById('nachKauf').style.display = 'block';
        document.getElementById('downloadBtn').style.display = 'block';
        document.getElementById('nachKauf').scrollIntoView({ behavior: 'smooth' });
        track('kauf_abgeschlossen', { fall_typ: dokumentTyp, wert: 39.45 });
    } catch(e) {
        document.getElementById('briefLoading').style.display = 'none';
        document.getElementById('preiseBox').style.display = 'block';
        alert('Fehler. Bitte erneut versuchen.');
    }
}

function downloadBrief() {
    const text = document.getElementById('briefText').textContent;
    const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'MietHilfe_Schreiben.txt';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
}
