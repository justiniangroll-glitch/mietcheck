const data = JSON.parse(rawData);
const nutzerdaten = JSON.parse(rawNutzer) || {};

// Echte Fehler nach Kauf

       </div>` : '';

const accountData = JSON.parse(localStorage.getItem('mietcheck_account') || '{}');
const affiliateCode = accountData.email ? btoa(accountData.email).replace(/=/g,'').substring(0,8) : 'SHARE';
const affiliateLink = `https://miethilfe-online.xyz/?ref=${affiliateCode}`;

const faqDaten = [
    { f: 'Was genau bekomme ich nach dem Kauf?', a: 'Sie erhalten sofort einen fertigen Widerspruchsbrief — aufgesetzt nach anwaltlichen Standards, versandfertig. Dazu die vollständige Erklärung der gefundenen Probleme und drei weitere Widersprüche für den Fall dass Ihr Vermieter erneut schreibt.' },

                : `Wir haben Gegenargumente gefunden die Ihre Position stärken.`

        </div>

        <!-- BILDPLATZHALTER 1: Hier könnte ein Bild eines erleichterten Mieters stehen -->

function toggleFaq(i) {
    const item = document.getElementById('faq' + i);
    const wasOffen = item.classList.contains('offen');
    document.querySelectorAll('.faq-item').forEach(el => el.classList.remove('offen'));
    if (!wasOffen) item.classList.add('offen');
}

async function kaufKlick() {
    track('kauf_geklickt', { fall_typ: dokumentTyp });
    const btn = document.querySelector('.btn-kaufen');
    btn.textContent = 'Wird weitergeleitet...';
    btn.disabled = true;
    try {
        const res = await fetch('/create-checkout', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ analyseErgebnis: data.ergebnis, nutzerdaten })
        });
        const session = await res.json();
        if (session.error) throw new Error(session.error);
        localStorage.setItem('pending_analyse', JSON.stringify(data));
        localStorage.setItem('pending_nutzerdaten', JSON.stringify(nutzerdaten));
        await stripe.redirectToCheckout({ sessionId: session.id });
    } catch(e) {
        btn.textContent = 'Freischalten · 39,45 €';
        btn.disabled = false;
        alert('Fehler. Bitte erneut versuchen.');
    }
}

const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get('success') === 'true') {
    document.getElementById('preiseBox').style.display = 'none';
    document.getElementById('briefLoading').style.display = 'block';
    const pendingAnalyse = localStorage.getItem('pending_analyse');
    const pendingNutzer = localStorage.getItem('pending_nutzerdaten');
    if (pendingAnalyse) {
        const pData = JSON.parse(pendingAnalyse);
        const pNutzer = JSON.parse(pendingNutzer) || {};
        fetch('/generate-brief', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ analyseErgebnis: pData.ergebnis, nutzerdaten: pNutzer })
        }).then(r => r.json()).then(briefData => {
            document.getElementById('briefLoading').style.display = 'none';
            document.getElementById('briefText').textContent = briefData.brief;
            document.getElementById('nachKauf').style.display = 'block';
            document.getElementById('downloadBtn').style.display = 'block';
            document.getElementById('nachKauf').scrollIntoView({ behavior: 'smooth' });
            track('kauf_abgeschlossen', { fall_typ: dokumentTyp, wert: 39.45 });
            localStorage.removeItem('pending_analyse');
            localStorage.removeItem('pending_nutzerdaten');
            setTimeout(() => { document.getElementById('accountModal').classList.add('aktiv'); }, 2000);
        }).catch(() => {
            document.getElementById('briefLoading').style.display = 'none';
            alert('Fehler beim Erstellen des Briefes.');
        });
    }
}

async function accountErstellen() {
    const email = document.getElementById('accountEmail').value;
    const passwort = document.getElementById('accountPasswort').value;
    const errorEl = document.getElementById('accountError');
    errorEl.style.display = 'none';
    if (!email || !passwort) { errorEl.textContent = 'Bitte Email und Passwort eingeben.'; errorEl.style.display = 'block'; return; }
    if (passwort.length < 6) { errorEl.textContent = 'Passwort mind. 6 Zeichen.'; errorEl.style.display = 'block'; return; }
    try {
        const res = await fetch('/register', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ email, passwort }) });
        const d = await res.json();
        if (d.success || d.fehler === 'Email bereits registriert') {
            localStorage.setItem('mietcheck_account', JSON.stringify({ email }));
            modalSchliessen();
        } else { errorEl.textContent = d.fehler || 'Fehler.'; errorEl.style.display = 'block'; }
    } catch(e) { modalSchliessen(); }
}

function modalSchliessen() { document.getElementById('accountModal').classList.remove('aktiv'); }

function downloadBrief() {
    const text = document.getElementById('briefText').textContent;
    const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'MietHilfe_Widerspruch.txt';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
}

function kopiereLink() {
    navigator.clipboard.writeText(affiliateLink).then(() => alert('Link kopiert!'));
}

function teileWhatsApp() {
    const text = encodeURIComponent(`Ich habe meine Mieterhöhung mit MietHilfe geprüft. Prüf deine auch kostenlos: ${affiliateLink}`);
    window.open(`https://wa.me/?text=${text}`, '_blank');
}
