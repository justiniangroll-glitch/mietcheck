<script>
const stripe = Stripe('pk_live_51TQ5hNDzuSFCSp7BUVE7K1qtSvLbDlutsvQPfGMzxzbeOIK6brX6XqEQtkr9fgCbTTwAbR4CfzErRV5Ii3wJhObz009s9Z35ao');

const rawData = localStorage.getItem('analyseErgebnis');
const rawNutzer = localStorage.getItem('nutzerdaten');
if (!rawData) { window.location.href = '/'; }

const data = JSON.parse(rawData);
const nutzerdaten = JSON.parse(rawNutzer) || {};
const analyse = data.ergebnis?.analyse;
const dokumentTyp = data.ergebnis?.dokumentTyp || nutzerdaten.vorgewaehlterTyp || 'MIETERHÖHUNG';
const modus = data.ergebnis?.modus || 'fragebogen';
const fehler = analyse?.fehler || [];
const maengel = analyse?.maengelArgumente || [];
const urteil = analyse?.gesamturteil || '';

function track(e, p) {
    window.dataLayer = window.dataLayer || [];
    window.dataLayer.push({ event: e, ...p });
    if (typeof gtag !== 'undefined') gtag('event', e, p || {});
}
track('ergebnis_gesehen', { fall_typ: dokumentTyp });

function getTimerString() {
    const now = new Date(); const midnight = new Date(); midnight.setHours(24,0,0,0);
    let diff = Math.floor((midnight - now) / 1000);
    const h = Math.floor(diff / 3600); diff -= h * 3600;
    const m = Math.floor(diff / 60); const s = diff - m * 60;
    const pad = n => String(n).padStart(2, '0');
    return `${pad(h)}:${pad(m)}:${pad(s)}`;
}
function updateTimer() { const el = document.getElementById('timer'); if (el) el.textContent = getTimerString(); }
setInterval(updateTimer, 1000);

// Urteil
let urteilKlasse = 'gelb', urteilBadge = 'Prüfenswert', urteilTitel = '', urteilSub = '';
const istUnzulaessig = urteil.includes('NICHT') || urteil === 'NICHT ZULÄSSIG' || urteil.includes('ANFECHTBAR');

if (istUnzulaessig) {
    urteilKlasse = 'rot';
    urteilBadge = 'Nicht zulässig';
    urteilTitel = 'Die Mieterhöhung Ihres Vermieters ist nicht zulässig.';
    urteilSub = 'Unsere Analyse hat Probleme gefunden. Sie müssen dieser Erhöhung nicht zustimmen.';
} else {
    urteilKlasse = 'gelb';
    urteilBadge = 'Prüfenswert';
    urteilTitel = 'Die Mieterhöhung ist prüfenswert.';
    urteilSub = 'Wir haben Gegenargumente gefunden die Ihre Position stärken.';
}

// Zahlen
const erhoehungEuro = parseFloat(analyse?.erhoehung_euro) || parseFloat(nutzerdaten.erhoehungEuro) || 0;
const aktuelleMinete = parseFloat(analyse?.aktuelle_miete) || parseFloat(nutzerdaten.aktuelleMinete) || 0;

// Echte Fehler nach Kauf
const echterFehlerHTML = fehler.map(f => {
    const b = f.schwere === 'KRITISCH' ? 'kritisch' : f.schwere === 'MITTEL' ? 'mittel' : 'gering';
    return `<div class="fehler-item-echt"><div class="fehler-kopf"><span class="fehler-badge ${b}">${f.schwere}</span><span class="fehler-paragraph">${f.paragraph||''}</span></div><div class="fehler-titel">${f.typ||''}</div><div class="fehler-erklaerung">${f.erklaerung||''}</div></div>`;
}).join('') || '<p style="font-size:14px;color:#555;">Analyse abgeschlossen.</p>';

const maengelHTML = maengel.length > 0
    ? `<div style="margin-top:16px;padding-top:16px;border-top:1px solid #f0f0f0;">
        <div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#999;margin-bottom:12px;">Ihre Gegenargumente</div>
        ${maengel.map(m=>`<div class="fehler-item-echt"><div class="fehler-kopf"><span class="fehler-badge mittel">${m.staerke||'MITTEL'}</span></div><div class="fehler-titel">${m.mangel||''}</div><div class="fehler-erklaerung">Mietminderungsrecht: bis zu ${m.minderungsrecht||'X'}%</div></div>`).join('')}
       </div>` : '';

const empSchritte = ['Miete wie gewohnt weiterzahlen. Der Mieterhöhung <strong>nicht</strong> zustimmen.', 'Das Schreiben per <strong>Einschreiben</strong> an Ihren Vermieter senden.', 'Bei einem neuen Schreiben des Vermieters erneut bei MietHilfe prüfen lassen.'];

const accountData = JSON.parse(localStorage.getItem('mietcheck_account') || '{}');
const affiliateCode = accountData.email ? btoa(accountData.email).replace(/=/g,'').substring(0,8) : 'SHARE';
const affiliateLink = `https://miethilfe-online.xyz/?ref=${affiliateCode}`;
const platzhalterHinweis = modus === 'fragebogen'
    ? `<div class="platzhalter-hinweis"><strong>Bitte beachten:</strong> Der Brief enthält Platzhalter wie <strong>[Ihr Name]</strong> und <strong>[Ihre Adresse]</strong>. Bitte ersetzen Sie diese vor dem Versenden mit Ihren echten Daten.</div>` : '';

const faqDaten = [
    { f: 'Kann ich die Mieterhöhung mit dem Schreiben sicher ablehnen?', a: 'Mit hoher Wahrscheinlichkeit zieht der Vermieter zurück oder macht beim nächsten Schreiben erneut Fehler. Jeder gewonnene Monat spart Ihnen Geld.' },
    { f: 'Kann ich nicht einfach per WhatsApp Nein sagen?', a: 'Nein — das reicht rechtlich nicht aus. Nach §558b BGB muss der Widerspruch in Textform erfolgen. Ohne formellen Widerspruch kann der Vermieter auf Zustimmung klagen.' },
    { f: 'Was ist wenn danach ein neues Schreiben kommt?', a: 'Auch beim zweiten Versuch passieren Vermietern häufig wieder Fehler. Ihre 3 enthaltenen Folge-Widersprüche sind genau dafür da.' },
    { f: 'Wann muss ich handeln?', a: 'Sie haben bis zum Ende des zweiten Kalendermonats nach Zugang des Schreibens Zeit. Danach gilt die Erhöhung rechtlich als akzeptiert — auch ohne Unterschrift.' }
];

document.getElementById('content').innerHTML = `

    <!-- 1. URTEIL -->
    <div class="urteil-block">
        <div class="urteil-badge ${urteilKlasse}">${urteilBadge}</div>
        <div class="urteil-titel ${urteilKlasse}">${urteilTitel}</div>
        <div class="urteil-sub">${urteilSub}</div>
    </div>

    <!-- 2. WAS DAS BEDEUTET -->
    <div class="abschnitt">
        <div class="abschnitt-headline">Was das jetzt für Sie bedeutet</div>
        <div class="abschnitt-text">Einfach gesagt: Die Mieterhöhung Ihres Vermieters ist <strong>nicht korrekt</strong>. Sie müssen diesen Betrag nicht zahlen.</div>
        <div class="abschnitt-text">Aber — und das ist entscheidend — das passiert nicht von alleine. <strong>Sie müssen aktiv widersprechen.</strong> Sonst gilt die Erhöhung als akzeptiert, auch wenn sie falsch ist.</div>
    </div>

    <!-- 3. OHNE WIDERSPRUCH VERLIEREN SIE -->

updateTimer();

function toggleFaq(i) {
    const item = document.getElementById('faq' + i);
    const wasOffen = item.classList.contains('offen');
    document.querySelectorAll('.faq-item').forEach(el => el.classList.remove('offen'));
    if (!wasOffen) item.classList.add('offen');
}

async function kaufKlick() {
    track('kauf_geklickt', { fall_typ: dokumentTyp });
    const btn = document.querySelector('.btn-kaufen');
    btn.textContent = 'Wird weitergeleitet...';
    btn.disabled = true;
    try {
        const res = await fetch('/create-checkout', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ analyseErgebnis: data.ergebnis, nutzerdaten })
        });
        const session = await res.json();
        if (session.error) throw new Error(session.error);
        localStorage.setItem('pending_analyse', JSON.stringify(data));
        localStorage.setItem('pending_nutzerdaten', JSON.stringify(nutzerdaten));
        await stripe.redirectToCheckout({ sessionId: session.id });
    } catch(e) {
        btn.textContent = 'Freischalten · 39,45 €';
        btn.disabled = false;
        alert('Fehler. Bitte erneut versuchen.');
    }
}

const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get('success') === 'true') {
    document.getElementById('preiseBox').style.display = 'none';
    document.getElementById('briefLoading').style.display = 'block';
    const pendingAnalyse = localStorage.getItem('pending_analyse');
    const pendingNutzer = localStorage.getItem('pending_nutzerdaten');
    if (pendingAnalyse) {
        const pData = JSON.parse(pendingAnalyse);
        const pNutzer = JSON.parse(pendingNutzer) || {};
        fetch('/generate-brief', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ analyseErgebnis: pData.ergebnis, nutzerdaten: pNutzer })
        }).then(r => r.json()).then(briefData => {
            document.getElementById('briefLoading').style.display = 'none';
            document.getElementById('briefText').textContent = briefData.brief;
            document.getElementById('nachKauf').style.display = 'block';
            document.getElementById('downloadBtn').style.display = 'block';
            document.getElementById('nachKauf').scrollIntoView({ behavior: 'smooth' });
            track('kauf_abgeschlossen', { fall_typ: dokumentTyp, wert: 39.45 });
            localStorage.removeItem('pending_analyse');
            localStorage.removeItem('pending_nutzerdaten');
            setTimeout(() => { document.getElementById('accountModal').classList.add('aktiv'); }, 2000);
        }).catch(() => {
            document.getElementById('briefLoading').style.display = 'none';
            alert('Fehler beim Erstellen des Briefes.');
        });
    }
}

async function accountErstellen() {
    const email = document.getElementById('accountEmail').value;
    const passwort = document.getElementById('accountPasswort').value;
    const errorEl = document.getElementById('accountError');
    errorEl.style.display = 'none';
    if (!email || !passwort) { errorEl.textContent = 'Bitte Email und Passwort eingeben.'; errorEl.style.display = 'block'; return; }
    if (passwort.length < 6) { errorEl.textContent = 'Passwort mind. 6 Zeichen.'; errorEl.style.display = 'block'; return; }
    try {
        const res = await fetch('/register', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ email, passwort }) });
        const d = await res.json();
        if (d.success || d.fehler === 'Email bereits registriert') {
            localStorage.setItem('mietcheck_account', JSON.stringify({ email }));
            modalSchliessen();
        } else { errorEl.textContent = d.fehler || 'Fehler.'; errorEl.style.display = 'block'; }
    } catch(e) { modalSchliessen(); }
}

function modalSchliessen() { document.getElementById('accountModal').classList.remove('aktiv'); }

function downloadBrief() {
    const text = document.getElementById('briefText').textContent;
    const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'MietHilfe_Widerspruch.txt';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
}

function kopiereLink() {
    navigator.clipboard.writeText(affiliateLink).then(() => alert('Link kopiert!'));
}

function teileWhatsApp() {
    const text = encodeURIComponent(`Ich habe meine Mieterhöhung mit MietHilfe geprüft. Prüf deine auch kostenlos: ${affiliateLink}`);
    window.open(`https://wa.me/?text=${text}`, '_blank');
}
