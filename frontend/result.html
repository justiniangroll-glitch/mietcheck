    </div>

            </div>
            <div class="option-body">
                Kostet in der Regel genauso viel wie die neue Miete selbst — plus 1–2 Wochen Wartezeit.
            </div>
        </div>

        <!-- Option 3: MietHilfe — bereits offen -->
        <div class="option-item highlight offen" id="opt2">
            <div class="option-header" onclick="toggleOption(2)">
                <div class="option-name" style="color:#1a2a4a;">MietHilfe Sofort-Hilfe</div>
                <div class="option-name-right">
                    <span class="option-arrow">▼</span>
                </div>
            </div>
            <div class="option-body">
                <div class="option-hacken">
                    <div class="option-hack"><span class="option-hack-check">✓</span><span>Juristisch fundierter Widerspruchsbrief — sofort versandfertig</span></div>
                    <div class="option-hack"><span class="option-hack-check">✓</span><span>In den meisten Fällen verschiebt sich die Mieterhöhung oder fällt ganz weg — wenn nicht, greift die Garantie</span></div>
                    <div class="option-hack"><span class="option-hack-check">✓</span><span>Unterstützung beim weiteren Verlauf — falls Ihr Vermieter erneut schreibt</span></div>
                </div>
            </div>
        </div>
    </div>

    <!-- ANGEBOT -->
    <div class="angebot-block" id="preiseBox">
        <div class="angebot-intro">
            <div class="logo-kreis-small">M</div>
            Deswegen vertrauen über 13.000 Mieter auf MietHilfe.
        </div>
        <div class="angebot-bild">
            <img src="https://i.imgur.com/QANPLHJ.jpg" alt="MietHilfe" onerror="this.parentElement.style.display='none'">
        </div>
        <p style="font-size:13px;color:#666;margin-bottom:12px;line-height:1.5;">Sie geben Ihre Angaben ein — unsere Software erstellt daraus Ihren persönlichen Widerspruchsbrief, der so direkt an ihren Vermieter geht.</p>
        <div class="leistungen-titel">Unsere Sofort-Hilfe beinhaltet:</div>
        <div class="leistungen-liste">
            <div class="leistung-item"><span class="leistung-check">✓</span><span class="leistung-text">Ihr Vermieter erhält ein <strong>juristisch fundiertes Widerspruchsschreiben</strong> — nach anwaltlichen Standards, sofort versandfertig.</span></div>
            <div class="leistung-item"><span class="leistung-check">✓</span><span class="leistung-text">Sie zahlen <strong>keinen Cent mehr</strong> — bis Ihr Vermieter das Verfahren neu aufrollt. In 63% der Fälle gibt er auf.</span></div>
            <div class="leistung-item"><span class="leistung-check">✓</span><span class="leistung-text">Meldet er sich erneut — <strong>Sie sind vorbereitet.</strong> Drei Folge-Widersprüche inklusive.</span></div>
        </div>
        <button class="btn-kaufen" onclick="kaufKlick()">Freischalten · 39,45 €</button>
        <div class="btn-sub">
            <span class="btn-sub-item">Einmalig</span>
            <span class="btn-sub-item">Kein Abo</span>
            <span class="btn-sub-item">Geld-zurück-Garantie</span>
        </div>
        <div class="garantie-block">
            <div class="garantie-badge">Weniger als 2% haben davon gebraucht</div>
            <div class="garantie-titel">Geld-zurück-Garantie</div>
            <div class="garantie-text">Wenn unser Schreiben die Mieterhöhung nicht verzögert oder abwendet — erhalten Sie jeden Euro zurück.</div>
        </div>
    </div>

    <!-- BILANZ -->
    <div class="bilanz-block">
        <div class="bilanz-titel">MietHilfe Bilanz seit 2019</div>
        <div class="bilanz-grid">
            <div class="bilanz-item"><div class="bilanz-zahl">Ø 340€</div><div class="bilanz-label">Im Schnitt pro Jahr gespart</div></div>
            <div class="bilanz-item"><div class="bilanz-zahl">63%</div><div class="bilanz-label">Vermieter ziehen zurück</div></div>
            <div class="bilanz-item"><div class="bilanz-zahl">13.000+</div><div class="bilanz-label">Mieterhöhungen geprüft</div></div>
        </div>
    </div>

    <!-- REVIEWS -->
    <div class="reviews-block">
        <div class="reviews-titel">Das sagen unsere Kunden</div>
        <div class="reviews-grid">
            <div class="review-card" style="background:#f0f4ff;border:1px solid #1a2a4a22;">
                <div class="review-sterne">★★★★★</div>
                <div class="review-text">Mieterhöhung zurückgezogen. Schnell und unkompliziert.</div>
                <div class="review-name">Nicole S., Berlin</div>
            </div>
            <div class="review-card" style="background:#fff8f0;border:1px solid #e8722a22;">
                <div class="review-sterne">★★★★★</div>
                <div class="review-text">Vermieter hat aufgegeben. 960 Euro im Jahr gespart.</div>
                <div class="review-name">Thomas B., Hamburg</div>
            </div>
            <div class="review-card" style="background:#f0fff4;border:1px solid #27ae6022;">
                <div class="review-sterne">★★★★★</div>
                <div class="review-text">Einfach und günstig. Hat sofort funktioniert.</div>
                <div class="review-name">Michael T., München</div>
            </div>
        </div>
    </div>

    <!-- FAQ -->
    <div class="faq-block">
        <div class="faq-titel">Häufige Fragen</div>
        ${faqDaten.map((faq,i)=>`<div class="faq-item" id="faq${i}"><button class="faq-frage" onclick="toggleFaq(${i})">${faq.f}<span class="faq-icon">+</span></button><div class="faq-antwort">${faq.a}</div></div>`).join('')}
    </div>

    <div class="loading-box" id="briefLoading">
        <div class="loading-spinner"></div>
        <div class="loading-text">Ihr Schreiben wird erstellt...</div>
    </div>

    <!-- NACH KAUF -->
    <div class="nach-kauf" id="nachKauf">
        <div class="nach-kauf-block">
            <div class="nach-kauf-titel">Ihr Widerspruchsschreiben</div>
            <div class="brief-text" id="briefText"></div>
            ${platzhalterHinweis}
            <button class="download-btn" id="downloadBtn" onclick="downloadBrief()">Brief herunterladen</button>
        </div>
        <div class="nach-kauf-block">
            <div class="nach-kauf-titel">Warum nennen wir dem Vermieter nicht die genauen Fehler?</div>
            <div class="trick-box">
                <div class="trick-titel">Unsere Strategie</div>
                <div class="trick-text">Unser Schreiben erklärt dem Vermieter nicht welche Fehler er gemacht hat. So muss er selbst herausfinden was falsch war — das kostet Zeit. Jeder gewonnene Monat ist Ihr finanzieller Gewinn.</div>
            </div>
        </div>
        <div class="nach-kauf-block">
            <div class="nach-kauf-titel">Die genauen Probleme Ihres Vermieters</div>
            ${echterFehlerHTML}
            ${maengelHTML}
        </div>
        <div class="nach-kauf-block">
            <div class="nach-kauf-titel">Ihre nächsten Schritte</div>
            <div class="empfehlung-item"><span class="empfehlung-nr">1</span><div class="empfehlung-text">Miete wie gewohnt zahlen. Mieterhöhung <strong>nicht</strong> zustimmen.</div></div>
            <div class="empfehlung-item"><span class="empfehlung-nr">2</span><div class="empfehlung-text">Schreiben per <strong>Einschreiben</strong> an Ihren Vermieter senden.</div></div>
            <div class="empfehlung-item"><span class="empfehlung-nr">3</span><div class="empfehlung-text">Bei neuem Schreiben des Vermieters erneut bei MietHilfe prüfen lassen.</div></div>
        </div>
        <div class="teilen-box">
            <h3>Kennen Sie jemanden mit demselben Problem?</h3>
            <p>Teilen Sie Ihren Link — bei jedem Kauf über Ihren Link sparen Sie und Ihre Freunde 15 € beim nächsten Schreiben.</p>
            <div class="teilen-link-box">
                <span class="teilen-link-text">${affiliateLink}</span>
                <button class="teilen-link-copy" onclick="kopiereLink()">Kopieren</button>
            </div>
            <div class="teilen-buttons">
                <button class="teilen-btn teilen-btn-wa" onclick="teileWhatsApp()">WhatsApp teilen</button>
                <button class="teilen-btn teilen-btn-copy" onclick="kopiereLink()">Link kopieren</button>
            </div>
        </div>
    </div>
`;

function toggleOption(i){
    const item=document.getElementById('opt'+i);
    const wasOffen=item.classList.contains('offen');
    document.querySelectorAll('.option-item').forEach(el=>el.classList.remove('offen'));
    if(!wasOffen)item.classList.add('offen');
}

function toggleFaq(i){
    const item=document.getElementById('faq'+i);
    const wasOffen=item.classList.contains('offen');
    document.querySelectorAll('.faq-item').forEach(el=>el.classList.remove('offen'));
    if(!wasOffen)item.classList.add('offen');
}

async function kaufKlick(){
    track('kauf_geklickt',{fall_typ:dokumentTyp});
    const btn=document.querySelector('.btn-kaufen');
    btn.textContent='Wird weitergeleitet...';btn.disabled=true;
    try{
        const res=await fetch('/create-checkout',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({analyseErgebnis:data.ergebnis,nutzerdaten})});
        const session=await res.json();
        if(session.error)throw new Error(session.error);
        localStorage.setItem('pending_analyse',JSON.stringify(data));
        localStorage.setItem('pending_nutzerdaten',JSON.stringify(nutzerdaten));
        await stripe.redirectToCheckout({sessionId:session.id});
    }catch(e){btn.textContent='Freischalten · 39,45 €';btn.disabled=false;alert('Fehler. Bitte erneut versuchen.');}
}

const urlParams=new URLSearchParams(window.location.search);
if(urlParams.get('success')==='true'){
    document.getElementById('preiseBox').style.display='none';
    document.getElementById('briefLoading').style.display='block';
    const pA=localStorage.getItem('pending_analyse');
    const pN=localStorage.getItem('pending_nutzerdaten');
    if(pA){
        const pData=JSON.parse(pA);const pNutzer=JSON.parse(pN)||{};
        fetch('/generate-brief',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({analyseErgebnis:pData.ergebnis,nutzerdaten:pNutzer})})
        .then(r=>r.json()).then(bd=>{
            document.getElementById('briefLoading').style.display='none';
            document.getElementById('briefText').textContent=bd.brief;
            document.getElementById('nachKauf').style.display='block';
            document.getElementById('downloadBtn').style.display='block';
            document.getElementById('nachKauf').scrollIntoView({behavior:'smooth'});
            track('kauf_abgeschlossen',{fall_typ:dokumentTyp,wert:39.45});
            localStorage.removeItem('pending_analyse');localStorage.removeItem('pending_nutzerdaten');
            setTimeout(()=>{document.getElementById('accountModal').classList.add('aktiv');},2000);
        }).catch(()=>{document.getElementById('briefLoading').style.display='none';alert('Fehler beim Erstellen des Briefes.');});
    }
}

async function accountErstellen(){
    const email=document.getElementById('accountEmail').value;
    const passwort=document.getElementById('accountPasswort').value;
    const errorEl=document.getElementById('accountError');
    errorEl.style.display='none';
    if(!email||!passwort){errorEl.textContent='Bitte Email und Passwort eingeben.';errorEl.style.display='block';return;}
    if(passwort.length<6){errorEl.textContent='Passwort mind. 6 Zeichen.';errorEl.style.display='block';return;}
    try{
        const res=await fetch('/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,passwort})});
        const d=await res.json();
        if(d.success||d.fehler==='Email bereits registriert'){localStorage.setItem('mietcheck_account',JSON.stringify({email}));modalSchliessen();}
        else{errorEl.textContent=d.fehler||'Fehler.';errorEl.style.display='block';}
    }catch(e){modalSchliessen();}
}

function modalSchliessen(){document.getElementById('accountModal').classList.remove('aktiv');}
function downloadBrief(){const text=document.getElementById('briefText').textContent;const blob=new Blob([text],{type:'text/plain;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='MietHilfe_Widerspruch.txt';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);}
function kopiereLink(){navigator.clipboard.writeText(affiliateLink).then(()=>alert('Link kopiert!'));}
function teileWhatsApp(){const text=encodeURIComponent(`Ich habe meine Mieterhöhung mit MietHilfe geprüft. Prüf deine auch kostenlos: ${affiliateLink}`);window.open(`https://wa.me/?text=${text}`,'_blank');}
</script>
</body>
</html>
