    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Georgia', serif; background: #fafafa; color: #1a1a1a; }
        .nav { padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; background: #1a2a4a; }
        .logo-container { display: flex; align-items: center; gap: 10px; }
        .logo-kreis { width: 28px; height: 28px; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: bold; color: #1a2a4a; }
        .logo { font-size: 16px; letter-spacing: 3px; text-transform: uppercase; font-weight: 600; color: white; font-family: Arial, sans-serif; }
        .nav-right { font-size: 11px; color: rgba(255,255,255,0.5); font-family: Arial, sans-serif; letter-spacing: 1px; text-transform: uppercase; }
        .container { max-width: 640px; margin: 0 auto; padding: 24px 16px 60px; }
        .box { background: white; border: 1px solid #e8e8e8; padding: 24px 20px; margin-bottom: 20px; }
        .box-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; font-family: Arial, sans-serif; color: #999; margin-bottom: 16px; }
        .urteil-titel { font-size: 22px; font-weight: normal; margin-bottom: 12px; line-height: 1.3; text-align: center; }
        .urteil-titel.rot { color: #c0392b; }
        .urteil-titel.gruen { color: #27ae60; }
        .urteil-titel.gelb { color: #d35400; }
        .urteil-linie { width: 28px; height: 1px; background: #1a1a1a; margin: 14px auto; }
        .urteil-text { font-size: 14px; line-height: 1.8; color: #555; text-align: center; }

        /* Verpixelte Fehler */
        .fehler-item-blur { padding: 12px 0; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; gap: 12px; }
        .fehler-item-blur:last-child { border-bottom: none; }
        .fehler-dot { width: 8px; height: 8px; border-radius: 50%; background: #c0392b; flex-shrink: 0; }
        .fehler-dot.mittel { background: #d35400; }
        .fehler-dot.gering { background: #2980b9; }
        .fehler-text-blur { font-size: 14px; color: #1a1a1a; filter: blur(4px); user-select: none; flex: 1; font-family: Arial, sans-serif; }

        /* Kosten */
        .kosten-zeile { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f5f5f5; font-family: Arial, sans-serif; }
        .kosten-zeile:last-of-type { border-bottom: none; }
        .kosten-label { font-size: 14px; color: #555; }
        .kosten-betrag { font-size: 16px; font-weight: 700; color: #c0392b; }
        .kosten-hinweis { margin-top: 14px; padding: 14px 16px; background: #f5f0eb; font-size: 13px; color: #444; line-height: 1.7; font-family: Arial, sans-serif; }

        /* Wichtig Box */
        .wichtig-box { background: #fff3cd; border: 2px solid #d35400; padding: 20px; margin-bottom: 16px; }
        .wichtig-box-titel { font-size: 14px; font-weight: bold; color: #d35400; font-family: Arial, sans-serif; margin-bottom: 14px; text-transform: uppercase; letter-spacing: 1px; }
        .wichtig-punkte { list-style: none; }
        .wichtig-punkte li { font-size: 14px; color: #333; line-height: 1.7; font-family: Arial, sans-serif; padding: 8px 0; border-bottom: 1px solid rgba(211,84,0,0.15); display: flex; gap: 10px; align-items: flex-start; }
        .wichtig-punkte li:last-child { border-bottom: none; background: #fff0d0; margin: 8px -20px -20px; padding: 12px 20px; }
        .wichtig-punkte li::before { content: "→"; color: #d35400; font-weight: bold; flex-shrink: 0; margin-top: 2px; }

        /* Sozial Hinweis */
        .sozial-hinweis { background: #f0f8f0; border-left: 4px solid #27ae60; padding: 16px 20px; margin-top: 16px; }
        .sozial-hinweis-titel { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; font-family: Arial, sans-serif; color: #27ae60; font-weight: 700; margin-bottom: 8px; }
        .sozial-hinweis-text { font-size: 14px; color: #333; line-height: 1.7; font-family: Arial, sans-serif; }

        /* Brief Zweck */
        .brief-zweck { padding: 16px 0 0; }
        .brief-zweck-text { font-size: 14px; color: #444; line-height: 1.7; font-family: Arial, sans-serif; }

        /* Vergleich */
        .vergleich-tabelle { width: 100%; border-collapse: collapse; margin-top: 20px; font-family: Arial, sans-serif; font-size: 13px; }
        .vergleich-tabelle th { padding: 10px 12px; text-align: left; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #999; border-bottom: 2px solid #e8e8e8; }
        .vergleich-tabelle th.h { color: #1a2a4a; }
        .vergleich-tabelle td { padding: 12px; border-bottom: 1px solid #f5f5f5; color: #444; }
        .vergleich-tabelle td.h { font-weight: 700; color: #1a2a4a; }
        .vergleich-tabelle tr:last-child td { border-bottom: none; }
        .tag-rot { color: #c0392b; font-weight: 700; }
        .tag-gruen { color: #27ae60; font-weight: 700; }

        /* Paywall */
        .paket { border: 2px solid #1a2a4a; padding: 24px 20px; position: relative; }
        .paket-badge { position: absolute; top: -12px; left: 16px; background: #1a2a4a; color: white; padding: 4px 12px; font-size: 10px; letter-spacing: 2px; font-family: Arial, sans-serif; }
        .paket-preis { font-size: 38px; margin-bottom: 4px; }
        .paket-sub { font-size: 11px; color: #999; font-family: Arial, sans-serif; margin-bottom: 20px; }
        .paket-linie { width: 28px; height: 1px; background: #e8e8e8; margin-bottom: 16px; }
        .paket-leistung { display: flex; gap: 12px; padding: 8px 0; border-bottom: 1px solid #f5f5f5; font-size: 14px; font-family: Arial, sans-serif; color: #333; }
        .paket-leistung:last-of-type { border-bottom: none; margin-bottom: 24px; }
        .paket-strich { color: #999; flex-shrink: 0; }
        .btn-kaufen { width: 100%; padding: 18px; background: #e8722a; color: white; border: none; font-size: 15px; font-weight: 700; cursor: pointer; border-radius: 4px; font-family: Arial, sans-serif; }
        .btn-kaufen:hover { background: #d4621a; }
        .bewertung { text-align: center; padding: 16px 0 0; }
        .sterne { font-size: 16px; color: #f39c12; }
        .bewertung-text { font-size: 11px; color: #999; font-family: Arial, sans-serif; margin-top: 4px; }

        /* Social */
        .social-balken { background: #f5f0eb; padding: 18px 20px; margin-bottom: 20px; text-align: center; }
        .social-balken-zahl { font-size: 16px; margin-bottom: 4px; }
        .social-balken-text { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; font-family: Arial, sans-serif; color: #999; }
        .social-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
        .social-card { background: white; border: 1px solid #e8e8e8; border-radius: 4px; overflow: hidden; }
        .social-image { width: 100%; height: 90px; background: #f5f5f5; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .social-image img { width: 100%; height: 100%; object-fit: cover; }
        .social-placeholder { font-size: 10px; text-transform: uppercase; color: #ccc; font-family: Arial, sans-serif; }
        .social-text { padding: 10px; }
        .social-name { font-size: 11px; font-weight: bold; margin-bottom: 3px; font-family: Arial, sans-serif; }
        .social-quote { font-size: 11px; color: #666; line-height: 1.4; font-family: Arial, sans-serif; }

        /* Nach Kauf */
        .nach-kauf { display: none; }
        .fehler-item-echt { padding: 14px 0; border-bottom: 1px solid #f0f0f0; }
        .fehler-item-echt:last-child { border-bottom: none; }
        .fehler-kopf { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
        .fehler-badge { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; font-family: Arial, sans-serif; padding: 3px 8px; border-radius: 2px; }
        .fehler-badge.kritisch { background: #fff0f0; color: #c0392b; }
        .fehler-badge.mittel { background: #fff8f0; color: #d35400; }
        .fehler-badge.gering { background: #f0f8ff; color: #2980b9; }
        .fehler-paragraph { font-size: 11px; color: #999; font-family: Arial, sans-serif; }
        .fehler-titel { font-size: 15px; margin-bottom: 6px; }
        .fehler-erklaerung { font-size: 13px; color: #555; line-height: 1.7; font-family: Arial, sans-serif; }
        .brief-text { font-size: 14px; line-height: 1.9; color: #333; white-space: pre-wrap; }
        .download-btn { width: 100%; padding: 14px; background: #1a2a4a; color: white; border: none; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; font-family: Arial, sans-serif; cursor: pointer; margin-top: 24px; border-radius: 4px; display: none; }
        .empfehlung-item { padding: 14px 0; border-bottom: 1px solid #f5f5f5; display: flex; gap: 14px; }
        .empfehlung-item:last-child { border-bottom: none; }
        .empfehlung-nr { font-size: 20px; font-weight: 700; color: #1a2a4a; flex-shrink: 0; min-width: 28px; font-family: Arial, sans-serif; line-height: 1.2; }
        .empfehlung-text { font-size: 14px; line-height: 1.7; color: #333; font-family: Arial, sans-serif; }
        .trick-box { background: #f5f0eb; border-left: 4px solid #1a2a4a; padding: 20px; margin-top: 20px; }
        .trick-titel { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; font-family: Arial, sans-serif; color: #1a2a4a; margin-bottom: 10px; font-weight: 700; }
        .trick-text { font-size: 13px; color: #444; line-height: 1.8; font-family: Arial, sans-serif; }
        .wieder-box { background: #1a2a4a; padding: 24px 20px; text-align: center; margin-top: 20px; border-radius: 4px; }
        .wieder-box h3 { font-size: 18px; color: white; font-weight: normal; margin-bottom: 8px; }
        .wieder-box p { font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 18px; line-height: 1.6; font-family: Arial, sans-serif; }
        .btn-wieder { display: inline-block; padding: 14px 28px; background: #e8722a; color: white; border: none; font-size: 13px; font-weight: 700; cursor: pointer; border-radius: 4px; text-decoration: none; font-family: Arial, sans-serif; }
        .loading-box { text-align: center; padding: 40px; display: none; }
        .loading-text { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; font-family: Arial, sans-serif; color: #999; }

        @media (min-width: 768px) {
            .container { padding: 40px 24px 80px; }

            .social-grid { grid-template-columns: repeat(5, 1fr); }
            .social-image { height: 100px; }

height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

<nav class="nav">
    <div class="logo-container">
        <div class="logo-kreis">M</div>
        <div class="logo">Mietcheck</div>
    </div>
    <div class="nav-right">Ihr Ergebnis</div>
</nav>

<div class="container" id="content">
    <div style="text-align:center; padding:60px">
        <p style="font-family:Arial,sans-serif; color:#999; font-size:12px">Wird geladen...</p>
    </div>
</div>

<script>
const rawData  = localStorage.getItem('analyseErgebnis');
const rawNutzer = localStorage.getItem('nutzerdaten');
if (!rawData) { window.location.href = '/'; }

const data        = JSON.parse(rawData);
const nutzerdaten = JSON.parse(rawNutzer) || {};
const analyse     = data.ergebnis?.analyse;
const dokumentTyp = data.ergebnis?.dokumentTyp || 'MIETERHÖHUNG';
const nkFall      = nutzerdaten.nkFall || 'NEBENKOSTENABRECHNUNG';
const fehler      = analyse?.fehler || [];
const maengel     = analyse?.maengelArgumente || [];
const urteil      = analyse?.gesamturteil || '';

// ── Urteil ──────────────────────────────────────────────────
let urteilKlasse = 'gelb', urteilTitel = '', urteilText = '';

if (dokumentTyp === 'MIETERHÖHUNG') {
    if (urteil.includes('NICHT') || urteil.includes('ANFECHTBAR')) {
        urteilKlasse = 'rot';
        urteilTitel  = 'Die Mieterhöhung Ihres Vermieters ist unzulässig.';
        urteilText   = 'Sie müssen dieser Erhöhung nicht zustimmen. Wir haben Fehler gefunden die Sie entlasten.';
    } else if (urteil === 'ZULÄSSIG') {
        urteilKlasse = 'gelb';
        urteilTitel  = 'Die Mieterhöhung ist formal korrekt.';
        urteilText   = 'Wir haben dennoch Gegenargumente gefunden die Ihre Verhandlungsposition stärken.';
    } else {
        urteilKlasse = 'gelb';
        urteilTitel  = 'Die Mieterhöhung ist teilweise anfechtbar.';
        urteilText   = 'Wir haben Punkte gefunden die Ihre Position erheblich stärken.';
    }
} else if (dokumentTyp === 'KÜNDIGUNG') {
    if (urteil === 'UNWIRKSAM' || urteil.includes('ANFECHTBAR')) {
        urteilKlasse = 'rot';
        urteilTitel  = 'Die Kündigung Ihres Vermieters ist anfechtbar.';
        urteilText   = 'Wir haben formelle Fehler oder angreifbare Punkte gefunden. Sie müssen nicht sofort ausziehen.';
    } else if (urteil === 'WIRKSAM') {
        urteilKlasse = 'gelb';
        urteilTitel  = 'Die Kündigung scheint formal korrekt.';
        urteilText   = 'Wir haben dennoch Gegenargumente gefunden die Sie nutzen können.';
    } else {
        urteilKlasse = 'gelb';
        urteilTitel  = 'Die Kündigung ist prüfenswert.';
        urteilText   = 'Wir haben Punkte gefunden die Ihre Position stärken könnten.';
    }
} else {
    if (urteil.includes('ANFECHTBAR')) {
        urteilKlasse = 'rot';
        urteilTitel  = nkFall === 'NEBENKOSTENABRECHNUNG_ANFORDERUNG'
            ? 'Ihr Vermieter verletzt seine Pflicht zur Abrechnung.'
            : 'Ihre Nebenkostenabrechnung enthält Fehler.';
        urteilText = nkFall === 'NEBENKOSTENABRECHNUNG_ANFORDERUNG'
            ? 'Der Vermieter ist gesetzlich zur Abrechnung verpflichtet. Wir haben Ansatzpunkte gefunden um diese einzufordern.'
            : 'Wir haben nicht umlagefähige Kosten oder Formfehler gefunden.';
    } else {
        urteilKlasse = 'gelb';
        urteilTitel  = 'Die Nebenkostenabrechnung ist prüfenswert.';
        urteilText   = 'Einzelne Punkte sollten genauer geprüft werden.';
    }
}

// ── Kostenrechner ────────────────────────────────────────────
const erhoehungEuro    = parseFloat(analyse?.erhoehung_euro) || 0;
const nachzahlungBetrag = parseFloat(nutzerdaten.nachzahlung) || parseFloat(analyse?.nachzahlung_betrag) || 0;
const vorauszahlungMtl  = parseFloat(nutzerdaten.vorauszahlung) || 0;
let kostenHTML = '';

if (dokumentTyp === 'MIETERHÖHUNG' && erhoehungEuro > 0) {
    kostenHTML = `<div class="box">
        <div class="box-label">Was passiert wenn Sie nicht handeln?</div>
        <div class="kosten-zeile"><span class="kosten-label">Mehrkosten pro Monat</span><span class="kosten-betrag">+ ${erhoehungEuro.toFixed(0)} €</span></div>
        <div class="kosten-zeile"><span class="kosten-label">Mehrkosten pro Jahr</span><span class="kosten-betrag">+ ${(erhoehungEuro*12).toFixed(0)} €</span></div>
        <div class="kosten-zeile"><span class="kosten-label">Mehrkosten in 3 Jahren</span><span class="kosten-betrag">+ ${(erhoehungEuro*36).toFixed(0)} €</span></div>
        <div class="kosten-hinweis"><strong>Sie müssen das nicht zahlen</strong> — denn die Erhöhung ist unzulässig. Ohne schriftlichen Widerspruch gilt Ihre Zustimmung aber als erteilt. Jeder gewonnene Monat ist bares Geld.</div>
    </div>`;
} else if (dokumentTyp === 'KÜNDIGUNG') {
    kostenHTML = `<div class="box">
        <div class="box-label">Was passiert wenn Sie nicht handeln?</div>
        <div class="kosten-zeile"><span class="kosten-label">Verlust Ihrer Wohnung</span><span class="kosten-betrag" style="color:#c0392b;">droht</span></div>
        <div class="kosten-zeile"><span class="kosten-label">Umzugskosten</span><span class="kosten-betrag">2.000 – 8.000 €</span></div>
        <div class="kosten-zeile"><span class="kosten-label">Kaution + erste Miete neue Wohnung</span><span class="kosten-betrag">2.000 – 5.000 €</span></div>
        <div class="kosten-zeile"><span class="kosten-label">Höhere Miete neue Wohnung</span><span class="kosten-betrag">oft +200–600 €/Monat</span></div>
        <div class="kosten-hinweis">Enthält die Kündigung Fehler müssen Sie <strong>nicht ausziehen</strong>. Selbst wenn sie wirksam ist: Jeder gewonnene Monat spart Ihnen Tausende Euro und gibt Ihnen Zeit für eine bessere Lösung.</div>
    </div>`;
} else if (nachzahlungBetrag > 0) {
    const besparnis = parseFloat(analyse?.gesamtePotenzielleBesparnis) || 0;
    kostenHTML = `<div class="box">
        <div class="box-label">Was steht auf dem Spiel?</div>
        <div class="kosten-zeile"><span class="kosten-label">Geforderte Nachzahlung</span><span class="kosten-betrag">${nachzahlungBetrag.toFixed(0)} €</span></div>
        ${besparnis > 0 ? `<div class="kosten-zeile"><span class="kosten-label">Davon potenziell nicht rechtmäßig</span><span class="kosten-betrag" style="color:#27ae60;">bis zu ${besparnis.toFixed(0)} €</span></div>` : ''}
        <div class="kosten-hinweis">Nicht alle Kosten darf der Vermieter umlegen. Ohne Widerspruch zahlen Sie möglicherweise <strong>mehr als gesetzlich erlaubt</strong> — für Leistungen die Sie nie erhalten haben.</div>
    </div>`;
} else if (nkFall === 'NEBENKOSTENABRECHNUNG_ANFORDERUNG' && vorauszahlungMtl > 0) {
    kostenHTML = `<div class="box">
        <div class="box-label">Was steht auf dem Spiel?</div>
        <div class="kosten-zeile"><span class="kosten-label">Monatliche Vorauszahlung</span><span class="kosten-betrag">${vorauszahlungMtl.toFixed(0)} €</span></div>
        <div class="kosten-zeile"><span class="kosten-label">Mögliches Guthaben pro Jahr</span><span class="kosten-betrag" style="color:#27ae60;">oft 200 – 600 €</span></div>
        <div class="kosten-hinweis">Für die Jahre <strong>${nutzerdaten.fehlendJahre || 'mit fehlender Abrechnung'}</strong> können Sie Guthaben zurückfordern. Der Vermieter ist gesetzlich verpflichtet abzurechnen und zu viel gezahltes Geld zurückzugeben.</div>
    </div>`;
}

// ── Sozialklausel Hinweis ─────────────────────────────────────
let sozialHinweisHTML = '';
if (dokumentTyp === 'KÜNDIGUNG' && nutzerdaten.sozialeHaerte) {
    const gruende = nutzerdaten.sozialeHaerte.split(',').map(s => s.trim()).filter(Boolean);
    if (gruende.length > 0) {
        sozialHinweisHTML = `
        <div class="sozial-hinweis">
            <div class="sozial-hinweis-titel">Ihr persönlicher Vorteil</div>
            <div class="sozial-hinweis-text">
                Aufgrund Ihrer Angaben zu <strong>${gruende.join(', ')}</strong> haben wir
                zusätzliche Ansatzpunkte für einen Widerspruch nach der Sozialklausel (§574 BGB) gefunden.
                Diese persönlichen Umstände können entscheidend sein um die Kündigung abzuwenden.
            </div>
        </div>`;
    }
}

// ── Wichtig-Punkte ────────────────────────────────────────────
let wichtigPunkte = [];

if (dokumentTyp === 'MIETERHÖHUNG') {
    wichtigPunkte = [
        `<strong>Mündliche Ablehnung reicht nicht.</strong> Ohne <u>schriftlichen</u> Widerspruch gilt Ihre Zustimmung als erteilt — die Erhöhung wird wirksam.`,
        `<strong>Einfaches Ignorieren hilft nicht.</strong> Die Frist läuft trotzdem ab. Danach ist eine Anfechtung rechtlich nicht mehr möglich.`,
        `<strong>Eigenes Schreiben ist riskant.</strong> Ein selbst verfasstes Schreiben enthält häufig Formfehler und kann genauso unwirksam sein wie das des Vermieters.`,
        `<strong>Wie jetzt zu handeln ist:</strong> Erheben Sie fristgerecht einen <u>Einspruch mit einem professionell formulierten Brief</u> — damit sichern Sie Ihre Rechte und gewinnen wertvolle Zeit.`
    ];
} else if (dokumentTyp === 'KÜNDIGUNG') {
    wichtigPunkte = [
        `<strong>Nicht sofort ausziehen.</strong> Erst wenn die Kündigung rechtlich bestätigt ist müssen Sie handeln — vorher haben Sie Zeit.`,
        `<strong>Widerspruch muss <u>schriftlich</u> erfolgen.</strong> Ein mündlicher Widerspruch ist rechtlich wertlos und schützt Sie nicht.`,

// Event: Ergebnis gesehen
function track(eventName, params) {
    window.dataLayer = window.dataLayer || [];
    window.dataLayer.push({ event: eventName, ...params });
    if (typeof gtag !== 'undefined') gtag('event', eventName, params || {});
}
track('ergebnis_gesehen', { fall_typ: dokumentTyp });

async function briefAnfordern() {
    // Event: Kauf geklickt
    track('kauf_geklickt', { fall_typ: dokumentTyp });

    document.getElementById('preiseBox').style.display = 'none';
    document.getElementById('socialBalken').style.display = 'none';
    document.getElementById('socialGrid').style.display = 'none';
    document.getElementById('briefLoading').style.display = 'block';
    try {
        const res = await fetch('/generate-brief', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ analyseErgebnis: data.ergebnis, nutzerdaten })
        });
        const briefData = await res.json();
        document.getElementById('briefLoading').style.display = 'none';
        document.getElementById('briefText').textContent = briefData.brief;
        document.getElementById('nachKauf').style.display = 'block';
        document.getElementById('downloadBtn').style.display = 'block';
        document.getElementById('nachKauf').scrollIntoView({ behavior: 'smooth' });
        // Event: Kauf abgeschlossen
        track('kauf_abgeschlossen', { fall_typ: dokumentTyp, wert: 39.45 });
    } catch(e) {
        document.getElementById('briefLoading').style.display = 'none';
        document.getElementById('preiseBox').style.display = 'block';
        document.getElementById('socialBalken').style.display = 'block';
        document.getElementById('socialGrid').style.display = 'grid';
        alert('Fehler. Bitte erneut versuchen.');
    }
}

function downloadBrief() {
    const text = document.getElementById('briefText').textContent;
    const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = 'MietCheck_Widerspruchsbrief.txt';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}
